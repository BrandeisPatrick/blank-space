version: '3.8'

services:
  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.local
      args:
        NODE_VERSION: '20'
        BUILD_ENV: ${BUILD_ENV:-production}
    container_name: blank-space-frontend
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
    env_file:
      - ${ENV_FILE:-.env.local}
    volumes:
      - ./apps/studio/dist:/app/dist:ro
      - ./.env.local:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blank-space-network

  # Backend API Server (optional)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        NODE_VERSION: '20'
    container_name: blank-space-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
    env_file:
      - ${ENV_FILE:-.env.local}
    volumes:
      - ./apps/server:/app/server:ro
      - ./.env.local:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blank-space-network
    profiles:
      - full-stack

  # Nginx Reverse Proxy (production-like)
  nginx:
    image: nginx:alpine
    container_name: blank-space-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ./apps/studio/dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - blank-space-network
    profiles:
      - production

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: blank-space-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - blank-space-network
    profiles:
      - cache

networks:
  blank-space-network:
    driver: bridge

volumes:
  redis-data: